name: Revision diaria de cartera

on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch: {}

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Verificar SDK Gemini
        run: python -c 'from google import genai; print("google-genai OK")'

      - name: Ejecutar revision
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -u src/run_review.py

      - name: Commit del estado actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json docs/index.html
          git diff --cached --quiet || git commit -m "chore: actualiza state.json y pagina $(date -u +'%Y-%m-%d')"
          git push

      - name: Subir artefacto para GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
